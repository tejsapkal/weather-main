<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Weather-Master</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="script.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Added Chart.js -->
  <link rel="icon" type="image/png" href="weather.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <h1>Weather Dashboard</h1>
  
  <div class="container">
    <div class="weather-input">
      <h3>Enter a City Name</h3>
      <input class="city-input" type="text" placeholder="Search City">
      <div class="button-group">
        <button class="search-btn">Search</button>
        <button class="location-btn">Use Current Location</button>
        <button class="temp-toggle-btn">°C / °F</button> 
      </div>
    </div>

    <div class="weather-data">
      <div class="current-weather">
        <div class="details">
          <h6>Temperature: __°C</h6>
          <h6>Wind: __ M/S</h6>
          <h6>Humidity: __%</h6>
        </div>
      </div>

      <div class="days-forecast">
        <h2>Forecast</h2>
        <ul class="weather-cards">
          <li class="card">
            <h6>Temp: __°C</h6>
            <h6>Wind: __ M/S</h6>
            <h6>Humidity: __%</h6>
          </li>
          <li class="card">
            <h6>Temp: __°C</h6>
            <h6>Wind: __ M/S</h6>
            <h6>Humidity: __%</h6>
          </li>
        </ul>
      </div>

      <!-- hourly forecast -->
      <div class="hourly-forecast">
        <h2>Hourly Forecast</h2>
        <div class="chart-container">
          <canvas id="hourly-chart"></canvas> <!-- Canvas for the chart -->
        </div>
        <ul class="hourly-cards">
          <!-- hourly cards -->
        </ul>
      </div>
    </div>
  </div>

</body>
</html>
